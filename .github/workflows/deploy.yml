name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.x

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Guard against docs/index.md
      run: |
        if [ -f docs/index.md ]; then
          echo "ERROR: docs/index.md must not exist. This site uses docs/index.html as the standalone Level 1 landing page. See LANDING-PAGE-NOTES.md."
          exit 1
        fi

    - name: Build MkDocs Site
      run: mkdocs build --site-dir public

    - name: Copy static interactive projects
      run: |
        for proj in scifi asimov; do
          if [ -d "$proj" ]; then
            cp -r "$proj" "public/$proj"
          fi
        done

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
